# spec.yaml — Machine-readable project specification
# Generated by README-First Spec

project: xinsite
version: 0.1.0
pattern: ai-native-portfolio

persona:
  primary: AI engineer / agent builder
  secondary: startup technical generalist
  tone: technical, direct, builder-oriented

capabilities:
  core:
    - single-page-portfolio          # Dark-themed homepage with 6 sections
    - ai-assistant-panel             # Persistent chat panel, streaming responses
    - voice-input                    # Push-to-talk via Web Speech API
    - project-showcase               # 4-6 featured MDX project cards
    - responsive-design              # Desktop + mobile
    - static-first-deployment        # Edge-deployed on Vercel
  user_requested:
    - ai-assistant-on-homepage       # Assistant is a first-class homepage feature, not hidden
    - industry-facing-content        # No academic CV framing; startup/industry oriented
    - dark-sci-fi-aesthetic          # Deep dark theme with glow/grid accents
  defaults:
    - seo-meta-tags                  # OG, structured data, meta descriptions
    - mdx-content-system             # Local MDX files, no CMS
    - analytics                      # Vercel Analytics or PostHog

constraints:
  tech_stack:
    framework: Next.js 15 (App Router)
    language: TypeScript
    styling: Tailwind CSS 4 + shadcn/ui
    animations: Framer Motion
    ai_sdk: Vercel AI SDK
    voice_input: Web Speech API
    deployment: Vercel
    content: MDX (local)
  design:
    - dark-theme-only-v0
    - mobile-responsive
    - single-page-with-sections
    - assistant-panel-right-side-or-bottom

assumptions:
  - category: domain
    assumed: chengxin.dev (not registered yet)
    reason: clean, professional, memorable
  - category: hosting
    assumed: Vercel free tier
    reason: sufficient for personal site traffic
  - category: ai-provider
    assumed: OpenAI (gpt-4o-mini) via OpenAI-compatible abstraction
    reason: lowest cost, good quality, swappable
  - category: cost-control
    assumed: rate limit ~20 messages per visitor session
    reason: prevent runaway API costs
  - category: cms
    assumed: none; MDX in git
    reason: simplest for a developer; no vendor lock-in
  - category: auth
    assumed: none; fully public
    reason: portfolio site has no gated content
  - category: blog
    assumed: placeholder in v0; full MDX blog in v1
    reason: scope control
  - category: voice-output
    assumed: deferred to v2
    reason: TTS adds complexity; text responses are fine for v0
  - category: publications
    assumed: not homepage-featured; accessible via link or assistant
    reason: industry-facing site; academic work is background, not hero
  - category: language
    assumed: English only in v0
    reason: primary audience is US/global industry

customizations:
  - assistant is a homepage hero element, not just a sidebar widget
  - persona blends AI/agent engineering with startup generalist
  - academic publications deliberately de-emphasized
  - voice input included in v0 (not deferred)

phases:
  v0:
    name: MVP
    target: 1 weekend
    scope:
      - project scaffold
      - all 6 homepage sections with placeholder content
      - dark theme
      - assistant text chat (streaming)
      - voice input (push-to-talk)
      - mobile responsive
      - Vercel deploy
  v1:
    name: Polish & Content
    scope:
      - real project MDX content with screenshots
      - scroll-triggered animations
      - assistant knowledge grounding
      - resume PDF
      - SEO
      - custom domain
  v2:
    name: Voice Output & Beyond
    scope:
      - TTS assistant responses
      - full blog section
      - analytics dashboard
      - rate limiting / cost controls
      - potential bilingual support
